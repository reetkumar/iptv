<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="REET TV - Premium IPTV streaming service offering live TV channels, on-demand content, and personalized recommendations. Watch your favorite shows and movies anytime, anywhere." />
    <meta name="keywords" content="IPTV, live TV, streaming, channels, on-demand, premium content, television" />
    <meta name="author" content="REET Kumar Bind" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.svg">
    
    <!-- DNS prefetch and preconnect for external resources -->
    <link rel="dns-prefetch" href="//supabase.co">
    <link rel="dns-prefetch" href="//iptv-org.github.io">
    <link rel="preconnect" href="//supabase.co" crossorigin>
    <link rel="preconnect" href="//iptv-org.github.io" crossorigin>
    
    <!-- Preload M3U playlist for faster initial load -->
    <link rel="prefetch" href="https://iptv-org.github.io/iptv/countries/in.m3u" as="fetch" crossorigin>
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://rkbtv.netlify.app" />
    
    <!-- Sitemap -->
    <link rel="sitemap" href="/sitemap.xml" type="application/xml" />
    
    <!-- Page Title -->
    <title>REET TV - Premium IPTV Streaming Service | Watch Live TV Online</title>
    
    <!-- Open Graph Meta Tags for social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="REET TV - Premium IPTV Streaming Service" />
    <meta property="og:description" content="Stream live TV channels, on-demand content, and more with REET TV. Your favorite entertainment anytime, anywhere." />
    <meta property="og:url" content="https://rkbtv.netlify.app" />
    <meta property="og:site_name" content="REET TV" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:image" content="https://rkbtv.netlify.app/favicon.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@reetmeena" />
    <meta name="twitter:title" content="REET TV - Premium IPTV Streaming" />
    <meta name="twitter:description" content="Watch live TV channels and on-demand content with REET TV." />
    <meta name="twitter:image" content="https://rkbtv.netlify.app/favicon.svg" />
    <meta name="twitter:creator" content="@reetmeena" />

    <!-- Additional SEO Tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="revisit-after" content="7 days" />
    <meta name="rating" content="general" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "REET TV",
        "url": "https://rkbtv.netlify.app",
        "description": "Premium IPTV streaming service offering live TV channels, on-demand content, and personalized recommendations",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://rkbtv.netlify.app?search={search_term_string}"
          },
          "query_input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Organization Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "REET TV",
        "url": "https://rkbtv.netlify.app",
        "logo": "https://rkbtv.netlify.app/favicon.svg",
        "description": "Premium IPTV streaming service with live TV channels",
        "sameAs": ["https://twitter.com/reetmeena"],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Support",
          "email": "support@reettv.com"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
