[build]
command = "npm run build"
publish = "dist"

[[redirects]]
from = "/tv-lite"
to = "/tv-lite.html"
status = 200

[[redirects]]
from = "/tv-lite.html"
to = "/tv-lite.html"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
command = "npm run build"

[context.deploy-preview]
command = "npm run build"

[context.branch-deploy]
command = "npm run build"
