[build]
command = "npm run build"
publish = "dist"

[[headers]]
for = "/*"
[headers.values]
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:; media-src 'self' https: blob:; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/favicon.svg"
[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/favicon.ico"
[headers.values]
Cache-Control = "public, max-age=604800"

[[redirects]]
from = "/tv-lite"
to = "/tv-lite.html"
status = 200

[[redirects]]
from = "/tv-lite.html"
to = "/tv-lite.html"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
command = "npm run build"

[context.deploy-preview]
command = "npm run build"

[context.branch-deploy]
command = "npm run build"
